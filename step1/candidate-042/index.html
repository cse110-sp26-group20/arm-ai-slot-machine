<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Gacha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Token Gacha 🎰</h1>
            <p>Spend your context window wisely!</p>
        </header>

        <main class="slot-machine">
            <div class="balance-display">
                <span>Context Window: </span>
                <span id="balance">1000</span>
                <span> Tokens</span>
            </div>

            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>

            <div class="controls">
                <button id="spin-button" class="btn">Generate (Cost: 10 Tokens)</button>
            </div>

            <div class="message-board" id="message-board">
                Ready to generate...
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
