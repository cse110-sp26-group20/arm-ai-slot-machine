<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Token Guzzler 9000</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎰 AI Token Guzzler 9000 🎰</h1>
        <p class="subtitle">Burn through your context window!</p>
      </header>

      <main>
        <div class="stats">
          <div class="stat-box">
            <span>Balance:</span>
            <span id="balance">10000</span>
            <span class="token-symbol">tkns</span>
          </div>
          <div class="stat-box">
            <span>Cost per Spin:</span>
            <span>100</span> <span class="token-symbol">tkns</span>
          </div>
        </div>

        <div class="slot-machine">
          <div class="reel" id="reel1">
            <div class="symbols">🤖</div>
          </div>
          <div class="reel" id="reel2">
            <div class="symbols">🧠</div>
          </div>
          <div class="reel" id="reel3">
            <div class="symbols">💸</div>
          </div>
        </div>

        <div class="controls">
          <button id="spin-btn">GENERATE (Spin)</button>
        </div>

        <div class="message-board">
          <p id="message">
            Insert your API key to begin... (Just kidding, hit Generate!)
          </p>
        </div>
      </main>

      <footer>
        <p>Warning: May hallucinate wins.</p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
