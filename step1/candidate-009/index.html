<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hype Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎰 AI Hype Machine 🎰</h1>
            <p>Spin the wheel of generative nonsense!</p>
        </header>

        <main class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>
            
            <div class="controls">
                <button id="spin-button" class="spin-btn">SPIN (Cost: 10 Tokens)</button>
            </div>

            <div class="status-board">
                <div class="tokens">
                    Compute Tokens: <span id="token-count">1000</span>
                </div>
                <div class="message" id="message">Insert tokens to generate AI hype!</div>
            </div>
        </main>
        
        <footer>
            <p>Powered by 100% genuine artificial hallucinations.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
