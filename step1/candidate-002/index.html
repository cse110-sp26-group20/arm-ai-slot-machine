<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One-Armed AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>The One-Armed AI</h1>
        <p class="subtitle">"As an AI language model, I am designed to drain your tokens."</p>

        <div class="machine">
            <div class="scoreboard">
                <div class="tokens-display">Tokens: <span id="balance">1000</span></div>
                <div class="cost-display">Cost per prompt: 10 Tokens</div>
            </div>

            <div class="reels">
                <div class="reel" id="reel1">🤖</div>
                <div class="reel" id="reel2">🤖</div>
                <div class="reel" id="reel3">🤖</div>
            </div>

            <div class="message-board" id="message">Insert tokens to generate a response.</div>

            <button id="spin-btn" class="spin-btn">Generate (Spin)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
