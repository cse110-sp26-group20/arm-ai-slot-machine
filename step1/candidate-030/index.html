<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎰 The Great AI Token Burner 🎰</h1>
        <div class="stats">
            <p>Compute Tokens: <span id="token-count">10000</span></p>
            <p id="message">Insert tokens to generate... I mean, spin!</p>
        </div>
        
        <div class="slot-machine">
            <div class="reel" id="reel1">🤖</div>
            <div class="reel" id="reel2">🤖</div>
            <div class="reel" id="reel3">🤖</div>
        </div>
        
        <div class="controls">
            <button id="spin-button" class="btn">Spin (Cost: 100 Tokens)</button>
        </div>

        <div class="legend">
            <h3>Paytable</h3>
            <ul>
                <li>🧠🧠🧠 AGI Achieved! (+5000)</li>
                <li>🖥️🖥️🖥️ GPU Hoarder (+2000)</li>
                <li>🤖🤖🤖 Job Automated (+1000)</li>
                <li>🌶️🌶️🌶️ Spicy Hallucination (+500)</li>
                <li>🗑️🗑️🗑️ Model Collapse (-500)</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
